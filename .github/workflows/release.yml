name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Trusted Publishing wants Node >= 22.14.0 + npm >= 11.5.1
          # (https://docs.npmjs.com/trusted-publishers/).
          node-version: 22
          cache: npm
          # NOTE: deliberately NO `registry-url`. setup-node's registry-url writes an
          # .npmrc with `always-auth=true` + `_authToken=${NODE_AUTH_TOKEN}`, making npm
          # attempt TOKEN auth. With the package set to require OIDC / disallow tokens,
          # that empty-token attempt 403s instead of falling through to OIDC. Omitting
          # registry-url lets `npm publish` use pure OIDC trusted publishing.
      # Node 22 ships npm 10.x; OIDC trusted publishing needs >= 11.5.1, so upgrade.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: npm run check:versions
      - run: npm test
      # No NODE_AUTH_TOKEN: authentication is via Trusted Publishing (OIDC),
      # configured at npmjs.com → package Settings → Trusted Publisher.
      # Provenance is emitted automatically under OIDC; --provenance is explicit.
      - run: npm publish --provenance --access public
