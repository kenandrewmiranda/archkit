name: Release

# ─────────────────────────────────────────────────────────────────────────────
# AUTO-PUBLISH DISABLED (2026-07-19). The npm registry has an unresolved
# account/package-side 403 hold on @kenandrewmiranda/archkit — 5 consecutive
# failed release runs, 2026-06-24 → 2026-07-17, every auth path (pure OIDC,
# token+provenance, token-only) returns an identical `403 Forbidden - PUT`.
# It is NOT the workflow/config; resolution is npm-support only.
#
# So tagging must not keep triggering doomed publishes. Distribution meanwhile
# is straight from GitHub (no npm needed):
#   • Claude Code plugin:  /plugin marketplace add kenandrewmiranda/archkit
#   • npm-from-git:        npm i -g github:kenandrewmiranda/archkit
#
# RE-ENABLE once npm clears the hold: uncomment the `push: tags` trigger below
# and push a vX.Y.Z tag. The publish job itself is unchanged and correct — no
# other edits needed. (You can also run it manually now via workflow_dispatch,
# which will still 403 until the hold lifts.)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:   # manual-only while the npm 403 hold is unresolved
  # push:
  #   tags: ['v*']     # ← re-enable this once npm support lifts the hold

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # Trusted Publishing wants Node >= 22.14.0 + npm >= 11.5.1
          # (https://docs.npmjs.com/trusted-publishers/).
          node-version: 22
          cache: npm
          # Token auth: registry-url writes an .npmrc wiring `_authToken=${NODE_AUTH_TOKEN}`
          # so `npm publish` authenticates with the NPM_TOKEN secret. (Pure OIDC Trusted
          # Publishing 403'd account-side from 2026-06-24 onward — see release history; this
          # is the token-based fallback while that hold is unresolved.)
          registry-url: 'https://registry.npmjs.org'
      # Node 22 ships npm 10.x; OIDC trusted publishing needs >= 11.5.1, so upgrade.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: npm run check:versions
      - run: npm test
      # Auth via the NPM_TOKEN secret (NODE_AUTH_TOKEN). Provenance retained
      # (id-token: write + public repo).
      #
      # KNOWN BLOCKER (2026-06-24 → 2026-07-17, unresolved): the registry 403s on
      # PUT regardless of auth path. Confirmed all three 403 identically — pure
      # OIDC, token+provenance, and token without provenance — so it is neither the
      # token nor provenance nor OIDC config. The token authenticates (403 Forbidden,
      # not 401), so it is an account/package-side hold. Resolution is npm-support
      # only; once cleared, just re-tag vX.Y.Z to publish — no workflow change needed.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
