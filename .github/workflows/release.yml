name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          # npm Trusted Publishing (OIDC) requires Node >= 22.14.0 AND npm >= 11.5.1
          # (https://docs.npmjs.com/trusted-publishers/). Node 20 publishes were
          # accepted until npm tightened enforcement (~Jun 2026), then started 403ing.
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      # Node 22 ships npm 10.x; OIDC trusted publishing needs >= 11.5.1, so upgrade.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: npm run check:versions
      - run: npm test
      # No NODE_AUTH_TOKEN: authentication is via Trusted Publishing (OIDC),
      # configured at npmjs.com → package Settings → Trusted Publisher.
      # Provenance is emitted automatically under OIDC; --provenance is explicit.
      - run: npm publish --provenance --access public
