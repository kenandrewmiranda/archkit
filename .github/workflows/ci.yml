name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Windows lane guards path-separator regressions — the review checks compare
    # file paths against `/`-delimited spec conventions, which silently match
    # nothing on backslash paths if not normalized.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:versions
      - run: npm test
